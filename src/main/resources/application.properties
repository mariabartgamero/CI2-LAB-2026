spring.application.name=corporate-carsharing

spring.datasource.url=jdbc:h2:file:./dbdata
spring.datasource.username=sa

spring.h2.console.enabled=true

spring.jpa.generate-ddl=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.security.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}

server.port=${SERVER_PORT:8080}
