<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | Corporate Carsharing</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="topbar">
        <div>
            <strong>Corporate Carsharing</strong>
            <span id="userBadge"></span>
        </div>
        <button class="button secondary" id="logoutBtn" type="button">Salir</button>
    </header>

    <main class="dashboard">
        <section class="panel">
            <h2>Buscar coches disponibles</h2>
            <form class="grid-form" id="searchCarsForm">
                <label>Latitud<input type="number" step="0.000001" name="lat" placeholder="40.4168"></label>
                <label>Longitud<input type="number" step="0.000001" name="lng" placeholder="-3.7038"></label>
                <label>Radio km<input type="number" step="0.1" name="radiusKm" placeholder="5"></label>
                <button class="button primary" type="submit">Buscar</button>
            </form>
            <div class="list" id="carsList"></div>
        </section>

        <section class="panel">
            <h2>Crear reserva</h2>
            <form class="grid-form" id="reservationForm">
                <label>ID coche<input type="number" name="carId" required></label>
                <label>Origen latitud<input type="number" step="0.000001" name="originLatitude" required></label>
                <label>Origen longitud<input type="number" step="0.000001" name="originLongitude" required></label>
                <label>Destino<input type="text" name="destination" required></label>
                <label>Inicio<input type="datetime-local" name="startTime" required></label>
                <label>Fin<input type="datetime-local" name="endTime" required></label>
                <button class="button primary" type="submit">Reservar</button>
            </form>
            <p class="message" id="reservationMessage"></p>
        </section>

        <section class="panel">
            <div class="section-head">
                <h2>Trayectos de mi empresa</h2>
                <button class="button secondary" id="refreshRidesBtn" type="button">Actualizar</button>
            </div>
            <div class="list" id="companyRidesList"></div>
        </section>

        <section class="panel">
            <div class="section-head">
                <h2>Mis reservas</h2>
                <button class="button secondary" id="refreshMineBtn" type="button">Actualizar</button>
            </div>
            <div class="list" id="myReservationsList"></div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
