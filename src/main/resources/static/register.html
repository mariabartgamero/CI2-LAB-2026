<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Corporate Carsharing</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="shell auth-shell">
        <form class="panel auth-form" id="registerForm">
            <h1>Crear cuenta</h1>
            <label>Nombre<input type="text" name="name" required></label>
            <label>Email<input type="email" name="email" required></label>
            <label>Password<input type="password" name="password" minlength="6" required></label>
            <label>Empresa<input type="text" name="companyName" required></label>
            <button class="button primary" type="submit">Crear cuenta</button>
            <p class="muted">Ya tienes cuenta? <a href="/login.html">Entrar</a></p>
            <p class="message" id="message"></p>
        </form>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
